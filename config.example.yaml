# 抖音监控配置 — 示例文件
# 复制此文件为 config.yaml，填入真实配置后使用
#
# 每个账号可单独配置 feishu_webhook，推送到专属飞书群；
# 留空或不填则自动使用下方 notify.feishu_webhook 全局默认。

accounts:
  # ── 抖音账号（platform 默认为 douyin，可省略）──
  - name: "砖哥讲装修"
    platform: "douyin"
    sec_uid: "MS4wLjABAAAA..."           # 抖音主页 URL 里的 sec_uid
    homepage: "https://www.douyin.com/user/MS4wLjABAAAA..."
    feishu_webhook: ""                    # 专属飞书群，留空用全局默认

  # ── B站账号 ──────────────────────────────────
  - name: "装修UP主"
    platform: "bilibili"
    uid: "123456789"                      # B站用户 UID（主页 URL 里的纯数字）
    homepage: "https://space.bilibili.com/123456789"
    sessdata: ""                          # B站登录 Cookie（SESSDATA），建议填写避免频率限制
    feishu_webhook: ""                    # 获取方式：浏览器登录B站 → F12 → Application → Cookies → SESSDATA

  # ── 更多抖音博主 ──────────────────────────────
  # - name: "娟姐四合院"
  #   platform: "douyin"
  #   sec_uid: "MS4wLjABAAAA..."
  #   feishu_webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/另一个群token"

# 检查间隔（分钟）
check_interval: 60

# 通知配置（全局默认，账号未配置专属 webhook 时使用）
notify:
  feishu_webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/你的token"
  dingtalk_webhook: ""
  wecom_webhook: ""
  email:
    enabled: false
    smtp_host: "smtp.qq.com"
    smtp_port: 465
    sender: "your@qq.com"
    password: "授权码"
    receiver: "your@qq.com"

# 抖音登录 Cookie（用于抓取精选联盟热销商品）
# 获取方式见 SHOWCASE_SETUP.md
douyin_cookies:
  sessionid: ""          # 必填
  ttwid: ""              # 必填
  passport_csrf_token: "" # 必填
  # sid_guard: ""        # 可选，增加稳定性

# LangChain 文案分析（DeepSeek）
ai_analyze:
  enabled: true
  openai_api_key: "sk-你的DeepSeek密钥"
  openai_base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
